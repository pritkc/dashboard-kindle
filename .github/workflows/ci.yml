name: ci

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26.0.0"
      - run: corepack enable
      - run: sudo apt-get update && sudo apt-get install -y imagemagick librsvg2-bin
      - run: pnpm check:renderer
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm audit:deps
      - run: pnpm scan:secrets
      - run: pnpm license:check
      - run: pnpm test
      - run: pnpm test:golden
      - run: pnpm build
      - run: docker build -t dashboard-kindle:ci .
      - run: DASHBOARD_KINDLE_SMOKE_IMAGE=dashboard-kindle:ci pnpm container:smoke
